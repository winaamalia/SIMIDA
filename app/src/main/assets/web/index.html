<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - SIMIDA</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .sidebar ul li a i {
            margin-right: 10px;
            width: 20px;
            text-align: center;
        }

        /* Styling Kotak Info Statistik Singkat */
        .info-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            flex: 1;
            min-width: 200px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(128, 0, 0, 0.15);
        }

        .card i {
            font-size: 2.5rem;
            color: maroon;
        }

        .card-details h3 {
            margin: 0;
            font-size: 1.8rem;
            color: inherit;
        }

        .card-details p {
            margin: 5px 0 0 0;
            color: #777;
            font-size: 14px;
        }

        /* Layout Grid untuk Grafik dan Tabel Aktivitas */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }
        }

        .chart-container, .activity-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .chart-container h3, .activity-container h3 {
            margin-top: 0;
            margin-bottom: 20px;
            color: maroon;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <img src="logo%20desa%20dayeuhkolot.png" alt="Logo Desa" class="brand-logo">
        <span class="brand-text">SIMIDA</span>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 5px 20px 15px 20px;">

    <ul>
        <li><a href="index.html" class="active"><i class="fa-solid fa-house"></i> Dashboard</a></li>
        <li><a href="barang.html"><i class="fa-solid fa-box"></i> Data Barang</a></li>
        <li><a href="peminjaman.html"><i class="fa-solid fa-clipboard-list"></i> Peminjaman</a></li>
        <li><a href="laporan.html"><i class="fa-solid fa-chart-simple"></i> Laporan</a></li>
        <li class="logout-item"><a href="#" onclick="logout(); return false;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
    </ul>
</div>

<div class="main">
    <div class="topbar" style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 1px solid #ddd; margin-bottom: 25px;">
        <h2>Dashboard Monitoring</h2>

        <div style="display: flex; align-items: center; gap: 15px; position: relative;">
            <div class="notification-wrapper" style="position: relative; display: inline-block;">
                <button id="notificationToggle" onclick="toggleNotifikasi()" style="background: none; border: none; cursor: pointer; padding: 10px; display: flex; align-items: center; justify-content: center; position: relative;">
                    <i class="fa-solid fa-bell" style="font-size: 1.5rem; color: #555;"></i>
                    <span id="notifBadge" style="display: none; position: absolute; top: 2px; right: 2px; background: #e74c3c; color: white; min-width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: bold; display: flex; justify-content: center; align-items: center; padding: 2px;">0</span>
                </button>

                <div id="notifDropdown" class="notif-dropdown" style="display: none; position: absolute; top: 45px; right: 0; width: 290px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.15); z-index: 9999; border: 1px solid #eee; overflow: hidden;">
                    <div class="notif-header" style="background: maroon; color: white; padding: 12px 15px; font-weight: bold; font-size: 14px; text-align: left;">Notifikasi Masuk</div>
                    <div id="notifList" class="notif-list" style="max-height: 250px; overflow-y: auto; text-align: left;"></div>
                </div>
            </div>
            <i id="darkIcon"
               class="fa-solid fa-moon"
               onclick="toggleDarkMode()"
               style="font-size: 1.5rem; cursor: pointer; color: #555; padding: 10px;">
            </i>
        </div>
    </div>

    <div class="info-cards">
        <a href="barang.html" class="card">
            <i class="fa-solid fa-boxes-stacked"></i>
            <div class="card-details">
                <h3 id="totalBarang">0</h3>
                <p>Total Barang</p>
            </div>
        </a>

        <a href="peminjaman.html" class="card">
            <i class="fa-solid fa-hand-holding-hand"></i>
            <div class="card-details">
                <h3 id="totalDipinjam">0</h3>
                <p>Sedang Dipinjam</p>
            </div>
        </a>

        <a href="barang.html" class="card">
            <i class="fa-solid fa-square-check"></i>
            <div class="card-details">
                <h3 id="totalTersedia">0</h3>
                <p>Tersedia</p>
            </div>
        </a>
    </div>

    <div class="dashboard-grid">
        <div class="chart-container">
            <h3><i class="fa-solid fa-chart-bar"></i> Grafik Stok Barang</h3>
            <div style="position: relative; height:280px; width:100%;">
                <canvas id="grafikBarang"></canvas>
            </div>
            <div style="margin-top:20px; height:250px;">
                <canvas id="pieStatusBarang"></canvas>
            </div>
        </div>

        <div class="activity-container">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> Aktivitas Terkini</h3>
            <div class="table-container" style="box-shadow: none; padding: 0;">
                <table>
                    <thead>
                    <tr>
                        <th>Nama Peminjam</th>
                        <th>Barang</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody id="tableDashboardPeminjaman"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="app.js"></script>
<script>
    window.addEventListener("load", function () {
        if (typeof initGrafikBarang === "function") {
            initGrafikBarang();
        }
    });
    const role = localStorage.getItem("sessionRole");

if (role !== "admin") {
    window.location.href = "admin_login.html";
}
</script>
</body>
</html>

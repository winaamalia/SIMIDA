<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persetujuan Peminjaman - Admin SIMIDA</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
<script>
    // Pengunci Tema Gelap Langsung Sebelum Render HTML
    if (localStorage.getItem("theme") === "dark"){
        document.body.classList.add("dark-mode");
    }
</script>

<div class="sidebar">
    <div class="sidebar-brand">
        <img src="logo%20desa%20dayeuhkolot.png" alt="Logo Desa" class="brand-logo">
        <span class="brand-text">SIMIDA</span>
    </div>

    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.2); margin: 5px 20px 15px 20px;">

    <ul>
        <li><a href="../../../../../../SIMIDA/dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
        <li><a href="../../../../../../SIMIDA/barang.html"><i class="fa-solid fa-box"></i> Data Barang</a></li>
        <li><a href="peminjaman.html" class="active"><i class="fa-solid fa-clipboard-list"></i> Peminjaman</a></li>
        <li><a href="laporan.html"><i class="fa-solid fa-chart-simple"></i> Laporan</a></li>
        <li class="logout-item">
            <a href="#" onclick="logout(); return false;"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
        </li>
    </ul>
</div>

<div class="main">
    <div class="topbar">
        <h2>Panel Persetujuan Peminjaman</h2>
    </div>

    <div class="table-container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Daftar Masuk Pengajuan Masyarakat</h3>
            <span id="totalPengajuanBadge" style="background: #eee; padding: 5px 10px; border-radius: 20px; font-size: 12px; color: #666; font-weight: bold;">
                Total Pengajuan: 0
            </span>
        </div>

        <table>
            <thead>
            <tr>
                <th>No</th>
                <th>Nama Peminjam</th>
                <th>Barang</th>
                <th>Tanggal  Waktu Pinjam</th>
                <th>Tanggal  Waktu Kembali</th>
                <th>Keterlambatan</th>
                <th>Status</th>
                <th style="text-align: center;">Tindakan Admin</th>
                <th>Jadwal Admin</th>
            </tr>
            </thead>
            <tbody id="tablePeminjaman">
            </tbody>
        </table>
    </div>
</div>
<script>
    window.addEventListener("DOMContentLoaded", function () {
        renderPeminjamanTable();
    });
    const role = localStorage.getItem("sessionRole");

if (role !== "admin") {
    window.location.href = "admin_login.html";
}
</script>
<script src="app.js"></script>
</body>
</html>

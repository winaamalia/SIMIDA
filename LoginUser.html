<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMIDA LOGIN - USER</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body class="login-body">

<div class="login-box">

    <div class="login-container">
        <h2>Login User SIMIDA</h2>

        <div class="input-group">
            <input type="text" id="usernameUser" placeholder="Username Anda">
        </div>

        <br>

        <div class="input-group">
            <input type="password" id="passwordUser" placeholder="Password Anda">
        </div>

        <br>

        <button type="button" onclick="loginUser()" class="btn btn-login">
            Masuk Sebagai User
        </button>

        <div style="margin-top: 20px; text-align: center;">
            <a href="admin_login.html" style="color: #800000; font-size: 13px; text-decoration: none; font-weight: bold;">
                <i class="fa-solid fa-user-gear"></i> Login sebagai Admin/Petugas
            </a>
        </div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
